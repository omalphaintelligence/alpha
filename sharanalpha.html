<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#f59e0b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Alpha Intelligence">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>Alpha Intelligence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;font-size:13px;min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
body.t-dark{--bg:#0a0d13;--s1:#12161f;--s2:#1a2030;--b1:#232b3d;--b2:#2e3850;--text:#e8eaed;--muted:#7c8797;--accent:#4a9eff;--gold:#d4a947;--green:#00c896;--red:#ff5c7a;--purple:#8b7fe0;--orange:#ff9f5a;--cyan:#3ec9d6}
body.t-navy{--bg:#020817;--s1:#0f1729;--s2:#162035;--b1:#1e3255;--b2:#2a4470;--text:#e2e8f0;--muted:#5a7099;--accent:#60a5fa;--gold:#fde68a;--green:#6ee7b7;--red:#fca5a5;--purple:#c4b5fd;--orange:#fdba74;--cyan:#a5f3fc}
body.t-green{--bg:#0a1a0f;--s1:#0d1f12;--s2:#132918;--b1:#1a4a28;--b2:#22623a;--text:#d1fae5;--muted:#4b7a5e;--accent:#10b981;--gold:#fbbf24;--green:#34d399;--red:#f87171;--purple:#a78bfa;--orange:#fb923c;--cyan:#22d3ee}
body.t-saffron{--bg:#1a0f00;--s1:#1f1200;--s2:#2d1a00;--b1:#5c3500;--b2:#7a4800;--text:#fef3c7;--muted:#92714a;--accent:#f59e0b;--gold:#fbbf24;--green:#86efac;--red:#fca5a5;--purple:#c4b5fd;--orange:#fb923c;--cyan:#67e8f9}
body.t-light{--bg:#ffffff;--s1:#ffffff;--s2:#f5f5f5;--b1:#e2e2e2;--b2:#c8c8c8;--text:#000000;--muted:#5c5c5c;--accent:#0044cc;--gold:#b8860b;--green:#0d7d3b;--red:#c8102e;--purple:#5b3fa0;--orange:#c65911;--cyan:#0077a3}
body{background:var(--bg);color:var(--text)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;background:var(--s1);border-bottom:2px solid var(--text);position:sticky;top:0;z-index:300}
.topbar-l{display:flex;align-items:center;gap:8px}
.logo{font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;color:var(--text);letter-spacing:-.3px;display:flex;align-items:center;gap:2px}
.logo-mark{display:none}
.logo b{color:var(--text);font-weight:700}
.ham{background:var(--s2);border:1px solid var(--b1);color:var(--text);border-radius:4px;padding:5px 9px;cursor:pointer;font-size:15px;line-height:1}
.mkt-tabs{display:flex;gap:3px}
.mkt-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--b1);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer}
.mkt-btn.active{background:var(--s2);border-color:var(--accent);color:var(--accent)}
.topbar-r{display:flex;align-items:center;gap:6px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#clock{font-family:monospace;font-size:11px;color:var(--muted)}
.theme-row{display:flex;align-items:center;gap:3px}
.td{width:14px;height:14px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.td.on{border-color:var(--text)}
.td-dark{background:#0a0d13}.td-navy{background:#0f1729}.td-green{background:#0d1f12}.td-saffron{background:#1f1200}.td-light{background:#cbd5e1}
.tabbar{display:flex;align-items:flex-end;background:var(--s1);border-bottom:2px solid var(--b1);padding:0 12px;overflow-x:auto;position:sticky;top:46px;z-index:200}
.tabbar::-webkit-scrollbar{height:3px}.tabbar::-webkit-scrollbar-thumb{background:var(--b2)}
.stab{padding:7px 12px;font-size:11px;font-weight:600;color:var(--muted);border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap}
.stab:hover{color:var(--text);background:var(--s2)}
.stab.active{background:var(--s2)}
.stab[data-t="ALL"].active{border-bottom-color:var(--cyan);color:var(--cyan)}
.stab[data-t="LC"].active{border-bottom-color:#3b82f6;color:#3b82f6}
.stab[data-t="MC"].active{border-bottom-color:#10b981;color:#10b981}
.stab[data-t="SC"].active{border-bottom-color:#8b5cf6;color:#8b5cf6}
.stab[data-t="FO"].active{border-bottom-color:#ef4444;color:#ef4444}
.stab[data-t="ET"].active{border-bottom-color:#f59e0b;color:#f59e0b}
.stab[data-t="LM"].active{border-bottom-color:#6366f1;color:#6366f1}
.stab[data-t="MS"].active{border-bottom-color:#14b8a6;color:#14b8a6}
.stab[data-t="SECTORS"].active{border-bottom-color:var(--purple);color:var(--purple)}
.stab[data-t="PORTFOLIO"].active{border-bottom-color:var(--gold);color:var(--gold)}
.stab[data-t="MODEL"].active{border-bottom-color:var(--green);color:var(--green)}
.stab[data-t="HISTORY"].active{border-bottom-color:#60a5fa;color:#60a5fa}
.stab[data-t="WATCHLIST"].active{border-bottom-color:#f43f5e;color:#f43f5e}
.stab[data-t="JOURNAL"].active{border-bottom-color:#84cc16;color:#84cc16}
.stab[data-t="LOG"].active{border-bottom-color:var(--muted);color:var(--text)}
.stab .tc{font-size:9px;margin-left:2px;opacity:.5}
.sb-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:499}
.sb-overlay.show{display:block}
.wrap{display:grid;grid-template-columns:1fr;min-height:calc(100vh - 92px)}
.wrap.sb-open{grid-template-columns:200px 1fr}
.sb{background:var(--s1);border-right:1px solid var(--b1);padding:10px;overflow-y:auto;position:fixed;top:92px;left:-210px;height:calc(100vh - 92px);width:200px;transition:left .25s;z-index:400}
.wrap.sb-open .sb{left:0}
.sb-sec{margin-bottom:12px}
.sb-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
select,input[type=text],input[type=number]{width:100%;padding:5px 7px;background:var(--s2);border:1px solid var(--b1);border-radius:4px;color:var(--text);font-size:12px;outline:none;margin-bottom:4px}
select:focus,input:focus{border-color:var(--accent)}
.rr{display:flex;gap:4px}.rr input{flex:1;margin-bottom:0}
.chk-g{display:flex;flex-direction:column;gap:3px}
.chk{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer}
.chk input{width:13px;height:13px;accent-color:var(--accent);margin:0}
.btn-a{width:100%;padding:7px;background:var(--accent);color:#fff;border:none;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;margin-top:2px}
.btn-r{width:100%;padding:5px;background:var(--s2);color:var(--muted);border:1px solid var(--b1);border-radius:4px;font-size:11px;cursor:pointer;margin-top:3px}
.content{padding:10px;overflow:auto}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:8px}
.kpi{background:var(--s1);border:1px solid var(--b1);border-radius:2px;padding:10px 12px}
.kpi.acc-gold,.kpi.acc-green,.kpi.acc-accent,.kpi.acc-purple,.kpi.acc-orange,.kpi.acc-cyan{border-color:var(--b1)}
.kpi-l{font-size:9.5px;color:var(--muted);font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.kpi-v{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace}
.kpi-s{font-size:10px;color:var(--muted);margin-top:1px}
.th-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.th-ttl{font-size:12px;font-weight:600;color:var(--muted)}
.th-acts{display:flex;gap:4px;align-items:center}
.srch{padding:4px 7px;background:var(--s2);border:1px solid var(--b1);border-radius:4px;color:var(--text);font-size:12px;width:130px;outline:none}
.ibtn{padding:4px 8px;background:var(--s2);border:1px solid var(--b1);border-radius:4px;color:var(--muted);font-size:11px;cursor:pointer}
.pulse-wrap{display:flex;align-items:center;gap:10px;margin:10px 0 8px;padding:8px 12px;background:var(--s1);border:1px solid var(--b1);border-radius:5px}
.pulse-lbl{font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--muted);flex-shrink:0}
.pulse-bar{flex:1;height:8px;border-radius:4px;background:var(--b1);overflow:hidden;position:relative}
.pulse-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold) 50%,var(--green));border-radius:4px;transition:width .5s ease;width:0%}
.pulse-pct{font-size:12px;font-weight:700;flex-shrink:0;min-width:38px;text-align:right}
.pills{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.pill{padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;background:var(--s1);border:1px solid var(--b1);color:var(--muted);cursor:pointer}
.pill.on{border-color:var(--accent);color:var(--accent)}
.tw{background:var(--s1);border:1px solid var(--b1);border-radius:5px;overflow:auto;max-height:calc(100vh - 260px)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 9px;text-align:left;font-size:9.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--b1);background:var(--s1);position:sticky;top:0;cursor:pointer;white-space:nowrap}
th:hover{color:var(--text)}
td{padding:6px 9px;border-bottom:1px solid rgba(100,116,139,.1);white-space:nowrap;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--s2)}
.bsb{display:inline-flex;padding:3px 8px;border-radius:2px;font-size:9.5px;font-weight:700;letter-spacing:.3px;background:#0d7d3b;color:#ffffff}
.bb{display:inline-flex;padding:3px 8px;border-radius:2px;font-size:9.5px;font-weight:700;letter-spacing:.3px;background:#0044cc;color:#ffffff}
.bw{display:inline-flex;padding:3px 8px;border-radius:2px;font-size:9.5px;font-weight:700;letter-spacing:.3px;background:#b8860b;color:#ffffff}
.rk{display:inline-flex;align-items:center;justify-content:center;min-width:28px;padding:2px 4px;border-radius:3px;font-size:11px;font-weight:700}
.rank-cell{display:flex;align-items:center;gap:6px}
.mbar{width:32px;height:4px;border-radius:2px;background:var(--b1);overflow:hidden;flex-shrink:0}
.mbar-fill{height:100%;border-radius:2px}
.r90{background:#e6f4ea;color:#0d7d3b}.r80{background:#e6edfa;color:#0044cc}.r70{background:#f7ecd9;color:#b8860b}
.cat{display:inline-flex;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:700}
.clc{background:rgba(59,130,246,.12);color:#60a5fa}.cmc{background:rgba(16,185,129,.12);color:#10b981}.csc{background:rgba(139,92,246,.12);color:#a78bfa}.cet{background:rgba(245,158,11,.12);color:#f59e0b}
.sym{font-weight:700;color:var(--text)}
.new-t{font-size:9px;background:rgba(139,92,246,.2);color:#a78bfa;padding:1px 3px;border-radius:3px;margin-left:2px;font-weight:700}
.own-t{font-size:9px;background:rgba(245,158,11,.2);color:#f59e0b;padding:1px 3px;border-radius:3px;margin-left:2px;font-weight:700}
.fno-t{font-size:9px;color:var(--cyan);font-weight:700;margin-left:2px}
.tv{color:var(--accent);text-decoration:none;font-size:13px;font-weight:700}
.price{font-family:monospace;font-weight:600}
.pos{color:var(--green);font-family:monospace;font-size:11px}
.neg{color:var(--red);font-family:monospace;font-size:11px}
.card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:6px;padding:10px 12px}
.card-l{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:3px}
.card-v{font-size:18px;font-weight:700;font-family:monospace}
.st-open{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.st-hit{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.2)}
.st-stop{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.log-box{background:var(--s2);border:1px solid var(--b1);border-radius:5px;padding:12px;font-family:monospace;font-size:11px;color:var(--muted);white-space:pre-wrap;line-height:1.8;min-height:180px}
.spin{width:24px;height:24px;border:3px solid var(--b2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:5px;padding:12px;color:#fca5a5;font-size:12px;line-height:1.7}
.empty{text-align:center;padding:3rem;color:var(--muted);font-size:12px}
.dt{font-size:10px;color:var(--muted)}
@media(max-width:768px){
  .wrap,.wrap.sb-open{grid-template-columns:1fr}
  .sb{top:0;width:280px;height:100vh;padding-top:56px;left:-290px}
  .wrap.sb-open .sb{left:0}
  .kpis{grid-template-columns:repeat(3,1fr);gap:4px}
  .kpi{padding:6px 8px}.kpi-v{font-size:14px}
  .content{padding:8px}
  #clock{display:none}.theme-row{display:none}
}
.status-bar{display:flex;gap:14px;flex-wrap:wrap;padding:6px 12px;background:var(--s2);border-bottom:1px solid var(--b1);font-size:10.5px;color:var(--muted)}
.ticker-strip{display:flex;gap:6px;overflow-x:auto;background:#0a0a0a;padding:8px 10px;white-space:nowrap}
.ticker-strip::-webkit-scrollbar{display:none}
.ticker-item{display:flex;align-items:center;gap:7px;padding:6px 12px;background:#1c1c1c;border-radius:3px;flex-shrink:0}
.ticker-label{font-size:10px;font-weight:700;color:#ffffff;letter-spacing:.3px}
.ticker-price{font-size:12px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#ffffff}
.ticker-chg{font-size:10.5px;font-weight:700;font-family:'JetBrains Mono',monospace;display:inline-flex;align-items:center;gap:2px}
.ticker-chg.up{color:#3ddc84}
.ticker-chg.down{color:#ff5c5c}
.ticker-loading{color:var(--muted);font-size:11px;padding:8px 14px}
.status-item{display:flex;align-items:center;gap:4px}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.status-ok{background:var(--green)}
.status-warn{background:var(--orange)}
.status-bad{background:var(--red)}
.clickable-row{cursor:pointer}
.clickable-row:hover td{background:var(--s2)}

/* SKELETON LOADING */
.skel-row td{padding:9px}
.skel-bar{height:12px;border-radius:4px;background:linear-gradient(90deg,var(--s2) 25%,var(--b1) 50%,var(--s2) 75%);background-size:200% 100%;animation:skelShine 1.4s ease-in-out infinite}
@keyframes skelShine{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* DETAIL MODAL */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:900;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-box{background:var(--s1);border:1px solid var(--b1);border-radius:10px;max-width:440px;width:100%;max-height:85vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--b1)}
.modal-sym{font-size:20px;font-weight:800}
.modal-close{background:var(--s2);border:1px solid var(--b1);color:var(--muted);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:16px;line-height:1}
.modal-body{padding:16px 18px}
.modal-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(100,116,139,.12);font-size:13px}
.modal-row:last-child{border-bottom:none}
.modal-lbl{color:var(--muted)}
.modal-val{font-weight:700;font-family:monospace}
.modal-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:16px 0 8px}
.trend-canvas{width:100%;height:70px;display:block;margin:8px 0}
.plan-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:6px}
.plan-box{background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:8px;text-align:center}
.plan-lbl{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase}
.plan-val{font-size:14px;font-weight:800;font-family:monospace;margin-top:2px}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-btn{flex:1;padding:9px;border-radius:6px;border:1px solid var(--b1);background:var(--s2);color:var(--text);font-size:12px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;display:block}
.modal-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
</style>
</head>
<body class="t-light">
<div class="sb-overlay" id="sbOverlay" onclick="closeSb()"></div>
<header class="topbar">
  <div class="topbar-l">
    <button class="ham" onclick="toggleSb()">&#9776;</button>
    <div class="logo"><span class="logo-mark"></span>Alpha<b>Intel</b></div>
  </div>
  <div class="mkt-tabs">
    <button class="mkt-btn active" onclick="switchMkt('NSE',this)">&#127470;&#127475; NSE</button>
    <button class="mkt-btn" onclick="switchMkt('US',this)">&#127482;&#127480; US</button>
  </div>
  <div class="topbar-r">
    <div class="theme-row">
      <span class="td td-dark" onclick="setTheme('dark',this)" title="Dark"></span>
      <span class="td td-navy" onclick="setTheme('navy',this)" title="Navy"></span>
      <span class="td td-green" onclick="setTheme('green',this)" title="Green"></span>
      <span class="td td-saffron" onclick="setTheme('saffron',this)" title="Saffron"></span>
      <span class="td td-light on" onclick="setTheme('light',this)" title="Light"></span>
    </div>
    <span id="dataUpdated" style="font-size:11px;color:var(--muted)"></span>
    <span style="font-size:11px;color:var(--muted)"><span class="live-dot"></span></span>
    <span id="clock"></span>
  </div>
</header>
<div class="ticker-strip" id="tickerStrip"><span class="ticker-loading">Loading market data...</span></div>
<div class="tabbar" id="tabbar"></div>
<div class="status-bar" id="statusBar"></div>
<div class="wrap" id="wrap">
  <aside class="sb" id="sidebar">
    <div class="sb-sec">
      <div class="sb-lbl">Signal</div>
      <div class="chk-g">
        <label class="chk"><input type="checkbox" id="fSB" checked> Strong Buy</label>
        <label class="chk"><input type="checkbox" id="fBUY" checked> Buy</label>
        <label class="chk"><input type="checkbox" id="fWT" checked> Watch</label>
      </div>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Sector</div>
      <select id="fSec"><option value="">All Sectors</option></select>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">RS Rank</div>
      <div class="rr">
        <input type="number" id="fRMin" value="70" min="1" max="99" placeholder="Min">
        <input type="number" id="fRMax" value="99" min="1" max="99" placeholder="Max">
      </div>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Min 3M %</div>
      <input type="number" id="fR3m" placeholder="e.g. 10">
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Extra</div>
      <div class="chk-g">
        <label class="chk"><input type="checkbox" id="fVol"> Vol Spike</label>

function timeAgo(iso){
  if(!iso) return "never";
  var diff = Date.now() - new Date(iso).getTime();
  var mins = Math.floor(diff/60000);
  if(mins<1) return "just now";
  if(mins<60) return mins+"m ago";
  var hrs = Math.floor(mins/60);
  if(hrs<24) return hrs+"h ago";
  var days = Math.floor(hrs/24);
  return days+"d ago";
}
function statusClass(iso, warnHrs, badHrs){
  if(!iso) return "status-bad";
  var hrs = (Date.now()-new Date(iso).getTime())/3600000;
  if(hrs>badHrs) return "status-bad";
  if(hrs>warnHrs) return "status-warn";
  return "status-ok";
}
function renderStatusBar(){
  var el = document.getElementById("statusBar");
  if(!el) return;
  var s = D.stepStatus;
  if(!s){ el.innerHTML=""; return; }
  var steps = MARKET==="NSE"
    ? [["step1","Prices"],["step2","Signals"],["step3a","VCP Data"],["step3b","Model PF"]]
    : [["step1","Prices"],["step2","Signals"],["step3a","VCP Data"],["step3b","Model PF"]];
  el.innerHTML = steps.map(function(st){
    var ts = s[st[0]];
    var cls = statusClass(ts, 26, 48);
    return '<span class="status-item"><span class="status-dot '+cls+'"></span>'+st[1]+': '+timeAgo(ts)+'</span>';
  }).join("");
}

function applyFilters(){
  if(!document.getElementById("tbody")) return;
  var sigs=[];
  if(document.getElementById("fSB").checked)  sigs.push("STRONG BUY");
  if(document.getElementById("fBUY").checked) sigs.push("BUY");
  if(document.getElementById("fWT").checked)  sigs.push("WATCH");
  var sec=document.getElementById("fSec").value;
  var rMin=+document.getElementById("fRMin").value||70;
  var rMax=+document.getElementById("fRMax").value||99;
  var r3mEl=document.getElementById("fR3m");
  var r3m=r3mEl.value!==""?+r3mEl.value:null;
  var volF=document.getElementById("fVol").checked;
  var nwF=document.getElementById("fNew").checked;
  var fnoF=document.getElementById("fFno").checked;
  var ownF=document.getElementById("fOwn").checked;
  var srchEl=document.getElementById("srch");
  var srch=srchEl?srchEl.value.toUpperCase().trim():"";
  var pool=getTabData();
  FILTERED=pool.filter(function(s){
    if(sigs.indexOf(s.signal)===-1) return false;
    if(sec&&s.sector!==sec) return false;
    if(ACTIVE_SECTOR&&s.sector!==ACTIVE_SECTOR) return false;
    if(s.rank<rMin||s.rank>rMax) return false;
    if(r3m!==null&&(s.ret3m===null||s.ret3m<r3m)) return false;
    if(volF&&s.vol!=="HIGH") return false;
    if(nwF&&!s.isNew) return false;
    if(fnoF&&!s.fno) return false;
    if(ownF&&!s.owned) return false;
    if(srch&&s.symbol.indexOf(srch)===-1) return false;
    return true;
  });
  FILTERED.sort(function(a,b){return b.rank-a.rank;});
  paintTable();
  var sb=FILTERED.filter(function(s){return s.signal==="STRONG BUY";}).length;
  var bu=FILTERED.filter(function(s){return s.signal==="BUY";}).length;
  var wa=FILTERED.filter(function(s){return s.signal==="WATCH";}).length;
  var vi=FILTERED.filter(function(s){return s.vol==="HIGH";}).length;
  var ni=FILTERED.filter(function(s){return s.isNew;}).length;
  ["kT","kSB","kB","kW","kV","kN"].forEach(function(id,i){
    var el=document.getElementById(id);
    if(el) el.textContent=[FILTERED.length,sb,bu,wa,vi,ni][i];
  });
  updatePulseBar(sb,bu,wa);
}

function updatePulseBar(sb,bu,wa){
  var fill=document.getElementById("pulseFill");
  var pct=document.getElementById("pulsePct");
  if(!fill||!pct) return;
  var total=sb+bu+wa;
  // Weight Strong Buy full, Buy 65%, Watch 30% toward a bullishness score
  var score = total>0 ? ((sb*1 + bu*0.65 + wa*0.3) / total * 100) : 0;
  fill.style.width = score.toFixed(0)+"%";
  pct.textContent = score.toFixed(0)+"% Bullish";
  pct.style.color = score>=60 ? "var(--green)" : score>=40 ? "var(--gold)" : "var(--red)";
}

}

function startPriceUpdates(){
  // Always clear old timer first (prevents overlap when switching tabs/markets)
  if(priceTimer){ clearInterval(priceTimer); priceTimer=null; }
  // Fetch once now (non-blocking, runs in background)
  fetchLivePrices();
  // Then refresh every 30 sec
  priceTimer=setInterval(fetchLivePrices, 30000);
}

function fetchLivePrices(){
  var reqMkt = MARKET;
  var symbols;
  if(ACTIVE_TAB==="MODEL"){
    var pos=(D.modelPortfolio&&D.modelPortfolio.positions)||[];
    if(!pos.length) return;
    symbols=pos.map(function(p){return p.symbol;});
  } else {
    var pool = getTabData();
    if(!pool.length) return;
    symbols = pool.map(function(s){ return s.symbol; });
  }
  var url = getUrl();
  var BATCH = 50;
  var batches = [];
  for(var i=0; i<symbols.length; i+=BATCH){
    batches.push(symbols.slice(i, i+BATCH));
  }
  var done = 0;
  function next(){
    if(done >= batches.length) return;
    // If user switched market mid-fetch, stop — don't paint wrong prices
    if(MARKET !== reqMkt) return;
    var syms = batches[done].join(",");
    fetch(url + "?action=live&symbols=" + encodeURIComponent(syms), {redirect:"follow"})
      .then(function(r){ return r.json(); })
      .then(function(data){
        if(MARKET !== reqMkt) return; // switched — ignore
        var batch={};
        Object.keys(data).forEach(function(sym){
          if(sym !== "_error") batch[sym]=data[sym];
        });
        updatePriceCells(batch); // paint this batch immediately
        done++;
        setTimeout(next, 150);
      })
      .catch(function(){ done++; setTimeout(next, 150); });
  }
  next();
}

function updatePriceCells(priceMap){
  var isN=MARKET==="NSE", cur=isN?"Rs.":"$";
  Object.keys(priceMap).forEach(function(sym){
    var d=priceMap[sym];
    if(!d||!d.price) return;
    var color=d.chg>=0?"#10b981":"#ef4444";
    var sign=d.chg>=0?"+":"";
    var html="<span style='font-family:monospace;font-weight:600'>"+cur+d.price.toFixed(2)+"</span><span style='font-size:10px;color:"+color+"'> "+sign+d.chg.toFixed(1)+"%</span>";
    // Screener table cell
    var el=document.getElementById("live-"+sym);
    if(el) el.innerHTML=html;
    // Model portfolio cell
    var mpEl=document.getElementById("mp-live-"+sym);
    if(mpEl) mpEl.innerHTML=html;
  });
}

function fetchMarketTicker(){
  var el = document.getElementById("tickerStrip");

  if(MARKET !== "US"){
    el.innerHTML = "";

    return;

  el.style.display = "flex";

  if(!FINNHUB_API_KEY || FINNHUB_API_KEY === "YOUR_FINNHUB_API_KEY_HERE"){
    el.innerHTML = "<span class=\"ticker-loading\">Add your free Finnhub API key in dashboard code to enable live index ticker</span>";
    return;
  }

  var reqMkt = MARKET;
  var promises = TICKER_SYMBOLS.map(function(t){
    return fetch("https://finnhub.io/api/v1/quote?symbol="+t.sym+"&token="+FINNHUB_API_KEY)
      .then(function(r){ return r.json(); })

  });

  Promise.all(promises).then(function(results){

function renderMarketTicker(list){

    el.innerHTML = "<span class=\"ticker-loading\">No market data</span>";

  el.innerHTML = list.map(function(idx){
    if(idx.price==null) return "";
    var up = idx.chg >= 0;

    return "<div class=\"ticker-item\">"+
      "<span class=\"ticker-label\">"+idx.label+"</span>"+
      "<span class=\"ticker-price\">$"+idx.price.toLocaleString()+"</span>"+
      "<span class=\"ticker-chg "+(up?"up":"down")+"\">"+arrow+" "+Math.abs(idx.chg).toFixed(2)+"%</span>"+
      "</div>";
  }).join("");
}

  tickerTimer = setInterval(fetchMarketTicker, 20000);
}

function drawTrend(s){
  var cv = document.getElementById("trendCanvas");
  if(!cv) return;
  var dpr = window.devicePixelRatio || 1;
  var w = cv.clientWidth, h = 70;
  cv.width = w*dpr; cv.height = h*dpr;
  var ctx = cv.getContext("2d");
  ctx.scale(dpr,dpr);

  // Build 4 relative points: 12M ago, 6M ago, 3M ago, now — all normalized
  // back from current price using the % returns we already have.
  var now = s.price || 100;
  var p12 = s.ret12m!=null ? now/(1+s.ret12m/100) : null;
  var p6  = s.ret6m!=null  ? now/(1+s.ret6m/100)  : null;
  var p3  = s.ret3m!=null  ? now/(1+s.ret3m/100)  : null;
  var pts = [p12,p6,p3,now].filter(function(v){return v!=null;});
  if(pts.length<2){ ctx.clearRect(0,0,w,h); return; }

  var min = Math.min.apply(null,pts), max = Math.max.apply(null,pts);
  var range = (max-min)||1;
  var padX = 8, padY = 10;
  var stepX = (w - padX*2) / (pts.length-1);

  var color = getComputedStyle(document.body).getPropertyValue('--accent').trim() || '#3b82f6';
  var upColor = getComputedStyle(document.body).getPropertyValue('--green').trim() || '#10b981';
  var lineColor = pts[pts.length-1] >= pts[0] ? upColor : color;

  ctx.clearRect(0,0,w,h);
  ctx.beginPath();
  pts.forEach(function(v,i){
    var x = padX + i*stepX;
    var y = padY + (h-padY*2) * (1 - (v-min)/range);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = 2.5;
  ctx.lineJoin = "round";
  ctx.stroke();

  // dots
  pts.forEach(function(v,i){
    var x = padX + i*stepX;
    var y = padY + (h-padY*2) * (1 - (v-min)/range);
    ctx.beginPath();
    ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle = lineColor;
    ctx.fill();
  });
}

function exportCSV(){
  if(!FILTERED.length){alert("No data");return;}
  var rows=[["Rank","Symbol","Sector","Cap","Price","Signal"]];
  FILTERED.forEach(function(s){rows.push([s.rank,s.symbol,s.sector,s.cat,s.price,s.signal]);});
  var a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(rows.map(function(r){return r.join(",");}).join("\n"));
  a.download=MARKET+"_"+ACTIVE_TAB+"_"+new Date().toISOString().slice(0,10)+".csv";
  a.click();
}
