<html lang="en">

<title>Alpha Intelligence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;min-height:100vh}
body.t-dark{--bg:#0a0e1a;--s1:#111827;--s2:#1a2235;--b1:#1e3a5f;--b2:#2a4a7f;--text:#e2e8f0;--muted:#64748b;--accent:#3b82f6;--gold:#f59e0b;--green:#10b981;--red:#ef4444;--purple:#8b5cf6;--orange:#f97316;--cyan:#06b6d4}
body.t-navy{--bg:#020817;--s1:#0f1729;--s2:#162035;--b1:#1e3255;--b2:#2a4470;--text:#e2e8f0;--muted:#5a7099;--accent:#60a5fa;--gold:#fde68a;--green:#6ee7b7;--red:#fca5a5;--purple:#c4b5fd;--orange:#fdba74;--cyan:#a5f3fc}
body.t-green{--bg:#0a1a0f;--s1:#0d1f12;--s2:#132918;--b1:#1a4a28;--b2:#22623a;--text:#d1fae5;--muted:#4b7a5e;--accent:#10b981;--gold:#fbbf24;--green:#34d399;--red:#f87171;--purple:#a78bfa;--orange:#fb923c;--cyan:#22d3ee}
body.t-saffron{--bg:#1a0f00;--s1:#1f1200;--s2:#2d1a00;--b1:#5c3500;--b2:#7a4800;--text:#fef3c7;--muted:#92714a;--accent:#f59e0b;--gold:#fbbf24;--green:#86efac;--red:#fca5a5;--purple:#c4b5fd;--orange:#fb923c;--cyan:#67e8f9}
body.t-light{--bg:#f1f5f9;--s1:#ffffff;--s2:#f8fafc;--b1:#cbd5e1;--b2:#94a3b8;--text:#0f172a;--muted:#64748b;--accent:#2563eb;--gold:#d97706;--green:#059669;--red:#dc2626;--purple:#7c3aed;--orange:#ea580c;--cyan:#0891b2}
body{background:var(--bg);color:var(--text)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 12px;height:46px;background:var(--s1);border-bottom:1px solid var(--b1);position:sticky;top:0;z-index:300}
.topbar-l{display:flex;align-items:center;gap:8px}
.logo{font-size:14px;font-weight:700;color:var(--gold)}
.ham{background:var(--s2);border:1px solid var(--b1);color:var(--text);border-radius:4px;padding:5px 9px;cursor:pointer;font-size:15px;line-height:1}
.mkt-tabs{display:flex;gap:3px}
.mkt-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--b1);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer}
.mkt-btn.active{background:var(--s2);border-color:var(--accent);color:var(--accent)}
.topbar-r{display:flex;align-items:center;gap:6px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#clock{font-family:monospace;font-size:11px;color:var(--muted)}
.theme-row{display:flex;align-items:center;gap:3px}
.td{width:14px;height:14px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.td.on{border-color:var(--text)}
.td-dark{background:#111827}.td-navy{background:#0f1729}.td-green{background:#0d1f12}.td-saffron{background:#1f1200}.td-light{background:#cbd5e1}
.tabbar{display:flex;align-items:flex-end;background:var(--s1);border-bottom:2px solid var(--b1);padding:0 12px;overflow-x:auto;position:sticky;top:46px;z-index:200}
.tabbar::-webkit-scrollbar{height:3px}.tabbar::-webkit-scrollbar-thumb{background:var(--b2)}
.stab{padding:7px 12px;font-size:11px;font-weight:600;color:var(--muted);border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap}
.stab:hover{color:var(--text);background:var(--s2)}
.stab.active{background:var(--s2)}
.stab[data-t="ALL"].active{border-bottom-color:var(--cyan);color:var(--cyan)}
.stab[data-t="LC"].active{border-bottom-color:#3b82f6;color:#3b82f6}
.stab[data-t="MC"].active{border-bottom-color:#10b981;color:#10b981}
.stab[data-t="SC"].active{border-bottom-color:#8b5cf6;color:#8b5cf6}
.stab[data-t="FO"].active{border-bottom-color:#ef4444;color:#ef4444}
.stab[data-t="ET"].active{border-bottom-color:#f59e0b;color:#f59e0b}
.stab[data-t="LM"].active{border-bottom-color:#6366f1;color:#6366f1}
.stab[data-t="MS"].active{border-bottom-color:#14b8a6;color:#14b8a6}
.stab[data-t="SECTORS"].active{border-bottom-color:var(--purple);color:var(--purple)}
.stab[data-t="PORTFOLIO"].active{border-bottom-color:var(--gold);color:var(--gold)}
.stab[data-t="MODEL"].active{border-bottom-color:var(--green);color:var(--green)}
.stab[data-t="HISTORY"].active{border-bottom-color:#60a5fa;color:#60a5fa}
.stab[data-t="WATCHLIST"].active{border-bottom-color:#f43f5e;color:#f43f5e}
.stab[data-t="JOURNAL"].active{border-bottom-color:#84cc16;color:#84cc16}
.stab[data-t="LOG"].active{border-bottom-color:var(--muted);color:var(--text)}
.stab .tc{font-size:9px;margin-left:2px;opacity:.5}
.sb-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:499}
.sb-overlay.show{display:block}
.wrap{display:grid;grid-template-columns:1fr;min-height:calc(100vh - 92px)}
.wrap.sb-open{grid-template-columns:200px 1fr}
.sb{background:var(--s1);border-right:1px solid var(--b1);padding:10px;overflow-y:auto;position:fixed;top:92px;left:-210px;height:calc(100vh - 92px);width:200px;transition:left .25s;z-index:400}
.wrap.sb-open .sb{left:0}
.sb-sec{margin-bottom:12px}
.sb-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
select,input[type=text],input[type=number]{width:100%;padding:5px 7px;background:var(--s2);border:1px solid var(--b1);border-radius:4px;color:var(--text);font-size:12px;outline:none;margin-bottom:4px}
select:focus,input:focus{border-color:var(--accent)}
.rr{display:flex;gap:4px}.rr input{flex:1;margin-bottom:0}
.chk-g{display:flex;flex-direction:column;gap:3px}
.chk{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer}
.chk input{width:13px;height:13px;accent-color:var(--accent);margin:0}
.btn-a{width:100%;padding:7px;background:var(--accent);color:#fff;border:none;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;margin-top:2px}
.btn-r{width:100%;padding:5px;background:var(--s2);color:var(--muted);border:1px solid var(--b1);border-radius:4px;font-size:11px;cursor:pointer;margin-top:3px}
.content{padding:10px;overflow:auto}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:8px}
.kpi{background:var(--s1);border:1px solid var(--b1);border-radius:5px;padding:8px 10px}
.kpi-l{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:3px}
.kpi-v{font-size:17px;font-weight:700;font-family:monospace}
.kpi-s{font-size:10px;color:var(--muted);margin-top:1px}
.th-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.th-ttl{font-size:12px;font-weight:600;color:var(--muted)}
.th-acts{display:flex;gap:4px;align-items:center}
.srch{padding:4px 7px;background:var(--s2);border:1px solid var(--b1);border-radius:4px;color:var(--text);font-size:12px;width:130px;outline:none}
.ibtn{padding:4px 8px;background:var(--s2);border:1px solid var(--b1);border-radius:4px;color:var(--muted);font-size:11px;cursor:pointer}
.pills{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.pill{padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;background:var(--s1);border:1px solid var(--b1);color:var(--muted);cursor:pointer}
.pill.on{border-color:var(--accent);color:var(--accent)}
.tw{background:var(--s1);border:1px solid var(--b1);border-radius:5px;overflow:auto;max-height:calc(100vh - 260px)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:7px 9px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--b1);background:var(--s1);position:sticky;top:0;cursor:pointer;white-space:nowrap}
th:hover{color:var(--text)}
td{padding:6px 9px;border-bottom:1px solid rgba(100,116,139,.1);white-space:nowrap;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--s2)}
.bsb{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.2)}
.bb{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.bw{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.2)}
.rk{display:inline-flex;align-items:center;justify-content:center;min-width:30px;padding:2px 4px;border-radius:3px;font-size:11px;font-weight:700;font-family:monospace}
.r90{background:rgba(16,185,129,.2);color:#10b981}.r80{background:rgba(59,130,246,.2);color:#60a5fa}.r70{background:rgba(245,158,11,.2);color:#f59e0b}
.cat{display:inline-flex;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:700}
.clc{background:rgba(59,130,246,.12);color:#60a5fa}.cmc{background:rgba(16,185,129,.12);color:#10b981}.csc{background:rgba(139,92,246,.12);color:#a78bfa}.cet{background:rgba(245,158,11,.12);color:#f59e0b}
.sym{font-weight:700;color:var(--text)}
.new-t{font-size:9px;background:rgba(139,92,246,.2);color:#a78bfa;padding:1px 3px;border-radius:3px;margin-left:2px;font-weight:700}
.own-t{font-size:9px;background:rgba(245,158,11,.2);color:#f59e0b;padding:1px 3px;border-radius:3px;margin-left:2px;font-weight:700}
.fno-t{font-size:9px;color:var(--cyan);font-weight:700;margin-left:2px}
.tv{color:var(--accent);text-decoration:none;font-size:13px;font-weight:700}
.price{font-family:monospace;font-weight:600}
.pos{color:var(--green);font-family:monospace;font-size:11px}
.neg{color:var(--red);font-family:monospace;font-size:11px}
.card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:6px;padding:10px 12px}
.card-l{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:3px}
.card-v{font-size:18px;font-weight:700;font-family:monospace}
.st-open{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.st-hit{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.2)}
.st-stop{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.log-box{background:var(--s2);border:1px solid var(--b1);border-radius:5px;padding:12px;font-family:monospace;font-size:11px;color:var(--muted);white-space:pre-wrap;line-height:1.8;min-height:180px}
.spin{width:24px;height:24px;border:3px solid var(--b2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:5px;padding:12px;color:#fca5a5;font-size:12px;line-height:1.7}
.empty{text-align:center;padding:3rem;color:var(--muted);font-size:12px}
.dt{font-size:10px;color:var(--muted)}
@media(max-width:768px){
  .wrap,.wrap.sb-open{grid-template-columns:1fr}
  .sb{top:0;width:280px;height:100vh;padding-top:56px;left:-290px}
  .wrap.sb-open .sb{left:0}
  .kpis{grid-template-columns:repeat(3,1fr);gap:4px}
  .kpi{padding:6px 8px}.kpi-v{font-size:14px}
  .content{padding:8px}
  #clock{display:none}.theme-row{display:none}
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
</style>

<body class="t-light">
<div class="sb-overlay" id="sbOverlay" onclick="closeSb()"></div>
<header class="topbar">

  </div>

</header>
<div class="tabbar" id="tabbar"></div>
<div class="wrap" id="wrap">
  <aside class="sb" id="sidebar">
    <div class="sb-sec">
      <div class="sb-lbl">Signal</div>
      <div class="chk-g">
        <label class="chk"><input type="checkbox" id="fSB" checked> Strong Buy</label>

      </div>

      <div class="sb-lbl">Sector</div>
      <select id="fSec"><option value="">All Sectors</option></select>
    </div>

      <div class="sb-lbl">RS Rank</div>

        <input type="number" id="fRMin" value="70" min="1" max="99" placeholder="Min">
        <input type="number" id="fRMax" value="99" min="1" max="99" placeholder="Max">

        <label class="chk"><input type="checkbox" id="fVol"> Vol Spike</label>

      </div>

<script>
var NSE_URL="https://script.google.com/macros/s/AKfycbxf48IaOaZtOBtZWf_RT8vUyR_6GqJJjJrivpgESy5Ha5F2igauMrqdXtkNMkXd2CxsZw/exec";
var US_URL="https://script.google.com/macros/s/AKfycbwcmvvMvgzifuawd6cHOOuymyYJeswHzDqTmPl3EdNsYTeTx8HfP6l7UMJxQ4NG7koo/exec";
var D={tabs:{},portfolio:[],modelPortfolio:{positions:[],journal:[]},history:[],watchlist:[],journal:[],log:""};
var CACHE_TTL=60*60*1000; // 60 min

var MEM_CACHE={};

function getCached(key){
  // Try memory first (fastest)
  var mc=MEM_CACHE[key];
  if(mc&&(Date.now()-mc.ts)<CACHE_TTL) return mc.data;
  // Try sessionStorage
  try{
    var c=JSON.parse(sessionStorage.getItem("ai_"+key));
    if(c&&(Date.now()-c.ts)<CACHE_TTL){
      MEM_CACHE[key]=c; // restore to memory
      return c.data;
    }
  }catch(e){}
  return null;
}
function setCached(key,data){
  var entry={data:data,ts:Date.now()};
  MEM_CACHE[key]=entry; // always save to memory
  try{
    sessionStorage.setItem("ai_"+key, JSON.stringify(entry));
  }catch(e){
    // sessionStorage full - clear old and retry
    try{sessionStorage.clear();sessionStorage.setItem("ai_"+key,JSON.stringify(entry));}catch(e2){}
  }
}
var FILTERED=[],ACTIVE_SECTOR="",MARKET="NSE",ACTIVE_TAB="ALL";
var NSE_TABS=[
  {id:"ALL",label:"ALL"},{id:"LC",label:"LARGE CAP"},{id:"MC",label:"MID CAP"},
  {id:"SC",label:"SMALL CAP"},{id:"FO",label:"F&O"},{id:"ET",label:"ETF"},
  {id:"LM",label:"LARGE+MID"},{id:"MS",label:"MID+SMALL"},
  {id:"SECTORS",label:"SECTORS"},{id:"PORTFOLIO",label:"PORTFOLIO"},
  {id:"MODEL",label:"MODEL PF"},{id:"HISTORY",label:"HISTORY"},
  {id:"WATCHLIST",label:"WATCHLIST"},{id:"LOG",label:"LOG"}
];
var US_TABS=[
  {id:"ALL",label:"ALL"},{id:"LC",label:"LARGE CAP"},{id:"MC",label:"MID CAP"},
  {id:"SC",label:"SMALL CAP"},{id:"ET",label:"ETF"},{id:"SECTORS",label:"SECTORS"},
  {id:"MODEL",label:"MODEL PF"},{id:"HISTORY",label:"RANK HISTORY"},
  {id:"WATCHLIST",label:"WATCHLIST"},{id:"JOURNAL",label:"JOURNAL"},{id:"LOG",label:"LOG"}
];

function fmtDate(d){
  if(!d) return "";
  var dt=new Date(String(d));
  if(isNaN(dt.getTime())) return String(d).slice(0,10);
  var mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return dt.getDate()+"-"+mo[dt.getMonth()]+"-"+dt.getFullYear();
}

function currentTabs(){return MARKET==="NSE"?NSE_TABS:US_TABS;}

function buildTabbar(){
  document.getElementById("tabbar").innerHTML=currentTabs().map(function(t){
    return "<button class=\"stab"+(t.id===ACTIVE_TAB?" active":"")+"\" data-t=\""+t.id+"\" onclick=\"switchTab('"+t.id+"',this)\">"+t.label+"<span class=\"tc\" id=\"tc-"+t.id+"\"></span></button>";
  }).join("");
}

function updateTabCounts(){
  var tabs=D.tabs||{};
  Object.keys(tabs).forEach(function(k){
    var el=document.getElementById("tc-"+k);
    var arr=tabs[k];
    if(el&&Array.isArray(arr)&&arr.length) el.textContent="("+arr.length+")";
  });
}

function switchTab(id,btn){
  ACTIVE_TAB=id;
  document.querySelectorAll(".stab").forEach(function(b){b.classList.remove("active");});
  btn.classList.add("active");
  ACTIVE_SECTOR="";
  if(window.innerWidth<=768) closeSb();
  renderTab();
}

function setTheme(n,dot){
  document.body.className="t-"+n;
  document.querySelectorAll(".td").forEach(function(d){d.classList.remove("on");});
  dot.classList.add("on");
  localStorage.setItem("ai_th",n);
}

function toggleSb(){
  document.getElementById("wrap").classList.toggle("sb-open");
  document.getElementById("sbOverlay").classList.toggle("show");
}

function closeSb(){
  document.getElementById("wrap").classList.remove("sb-open");
  document.getElementById("sbOverlay").classList.remove("show");
}

function tick(){document.getElementById("clock").textContent=new Date().toLocaleTimeString();}
setInterval(tick,1000);tick();

function getUrl(){return MARKET==="NSE"?NSE_URL:US_URL;}

function switchMkt(mkt,btn){
  MARKET=mkt;
  document.querySelectorAll(".mkt-btn").forEach(function(b){b.classList.remove("active");});
  btn.classList.add("active");
  ACTIVE_TAB="ALL";
  var url=new URL(window.location.href);
  url.searchParams.set("m",mkt.toLowerCase());
  window.history.replaceState({},"",url.toString());
  buildTabbar();
  loadData(); // loadData will use cache if available
}

function forceLoad(){
  // Clear screener cache for current market
  delete CACHE[MARKET+"_data"];
  loadData();
}

function loadData(){
  var mc=document.getElementById("mainContent");

  // Check screener cache (60 min)
  var cacheKey=MARKET+"_data";
  var cached=getCached(cacheKey);
  if(cached){
    D=cached;
    buildSectorSelect();
    updateTabCounts();
    renderTab();
    return;
  }

  var quotes=[
    "Anything can happen. — Mark Douglas",

function applyFilters(){
  if(!document.getElementById("tbody")) return;
  var sigs=[];
  if(document.getElementById("fSB").checked)  sigs.push("STRONG BUY");
  if(document.getElementById("fBUY").checked) sigs.push("BUY");
  if(document.getElementById("fWT").checked)  sigs.push("WATCH");
  var sec=document.getElementById("fSec").value;
  var rMin=+document.getElementById("fRMin").value||70;
  var rMax=+document.getElementById("fRMax").value||99;
  var r3mEl=document.getElementById("fR3m");
  var r3m=r3mEl.value!==""?+r3mEl.value:null;
  var volF=document.getElementById("fVol").checked;
  var nwF=document.getElementById("fNew").checked;
  var fnoF=document.getElementById("fFno").checked;
  var ownF=document.getElementById("fOwn").checked;
  var srchEl=document.getElementById("srch");
  var srch=srchEl?srchEl.value.toUpperCase().trim():"";
  var pool=getTabData();
  FILTERED=pool.filter(function(s){
    if(sigs.indexOf(s.signal)===-1) return false;
    if(sec&&s.sector!==sec) return false;
    if(ACTIVE_SECTOR&&s.sector!==ACTIVE_SECTOR) return false;
    if(s.rank<rMin||s.rank>rMax) return false;
    if(r3m!==null&&(s.ret3m===null||s.ret3m<r3m)) return false;
    if(volF&&s.vol!=="HIGH") return false;
    if(nwF&&!s.isNew) return false;
    if(fnoF&&!s.fno) return false;
    if(ownF&&!s.owned) return false;
    if(srch&&s.symbol.indexOf(srch)===-1) return false;
    return true;
  });
  FILTERED.sort(function(a,b){return b.rank-a.rank;});
  paintTable();
  var sb=FILTERED.filter(function(s){return s.signal==="STRONG BUY";}).length;
  var bu=FILTERED.filter(function(s){return s.signal==="BUY";}).length;
  var wa=FILTERED.filter(function(s){return s.signal==="WATCH";}).length;
  var vi=FILTERED.filter(function(s){return s.vol==="HIGH";}).length;
  var ni=FILTERED.filter(function(s){return s.isNew;}).length;
  ["kT","kSB","kB","kW","kV","kN"].forEach(function(id,i){
    var el=document.getElementById(id);
    if(el) el.textContent=[FILTERED.length,sb,bu,wa,vi,ni][i];
  });
}

function resetFilters(){
  ["fSB","fBUY","fWT"].forEach(function(id){document.getElementById(id).checked=true;});
  ["fVol","fNew","fFno","fOwn"].forEach(function(id){document.getElementById(id).checked=false;});
  document.getElementById("fSec").value="";
  document.getElementById("fRMin").value=70;
  document.getElementById("fRMax").value=99;
  document.getElementById("fR3m").value="";
  var s=document.getElementById("srch");
  if(s) s.value="";
  ACTIVE_SECTOR="";
  buildPills();
  applyFilters();
}

function fetchLivePrices(){
  var pool = getTabData();
  if(!pool.length) return;
  
  var symbols = pool.map(function(s){ return s.symbol; });
  var url     = getUrl(); // same Apps Script URL
  var BATCH   = 50;
  var priceMap = {};
  var batches  = [];
  
  for(var i=0; i<symbols.length; i+=BATCH){
    batches.push(symbols.slice(i, i+BATCH));
  }
  
  var done = 0;
  function next(){
    if(done >= batches.length){
      updatePriceCells(priceMap);
      return;
    }
    var syms = batches[done].join(",");
    var syms2=batches[done].join(",");
    fetch(url + "?action=live&symbols=" + encodeURIComponent(syms2), {redirect:"follow"})
      .then(function(r){ return r.json(); })
      .then(function(data){
        Object.keys(data).forEach(function(sym){
          if(sym !== "_error") priceMap[sym] = data[sym];
        });
        done++;
        setTimeout(next, 200);
      })
      .catch(function(){ done++; setTimeout(next, 200); });
  }
  next();
}

function updatePriceCells(priceMap){
  var isN=MARKET==="NSE", cur=isN?"Rs.":"$";
  Object.keys(priceMap).forEach(function(sym){
    var el=document.getElementById("live-"+sym);
    var d=priceMap[sym];
    if(!el||!d||!d.price) return;
    var color=d.chg>=0?"#10b981":"#ef4444";
    var sign=d.chg>=0?"+":"";
    el.innerHTML="<span style='font-family:monospace;font-weight:600'>"+cur+d.price.toFixed(2)+"</span><span style='font-size:10px;color:"+color+"'> "+sign+d.chg.toFixed(1)+"%</span>";
  });
}

      "<td><span class=\""+(p.pnlPct>=0?"pos":"neg")+"\">"+(p.pnlPct||0).toFixed(1)+"%</span></td>"+
      "<td>"+st+"</td>"+
      "<td><a class=\"tv\" href=\"https://www.tradingview.com/chart/?symbol="+(MARKET==="NSE"?"NSE%3A":"")+p.symbol+"&interval=D\" target=\"_blank\">&#8599;</a></td>"+
      "<td class=\"dt\">"+p.daysHeld+"d</td>"+
      "<td class=\"price\">"+cur+(p.entryPrice||0).toFixed(2)+"</td>"+
      "<td style=\"color:var(--red);font-family:monospace;font-size:11px\">"+cur+(p.stopLoss||0).toFixed(2)+"</td>"+
      "<td style=\"color:var(--green);font-family:monospace;font-size:11px\">"+cur+(p.target||0).toFixed(2)+"</td></tr>";
  }).join("");
  var jRows=jrnl.slice(-10).reverse().map(function(j){
    var ac=j.action==="ENTRY"?"<span class=\"bb\" style=\"font-size:10px\">ENTRY</span>":j.action==="TARGET HIT"?"<span class=\"st-hit\" style=\"font-size:10px\">HIT</span>":"<span class=\"st-stop\" style=\"font-size:10px\">STOP</span>";
    return "<tr><td class=\"sym\">"+j.symbol+"</td><td>"+ac+"</td>"+
      "<td class=\"price\">"+cur+(j.price||0).toFixed(2)+"</td>"+
      "<td><span class=\""+(j.pnlPct>=0?"pos":"neg")+"\">"+(j.pnlPct||0).toFixed(1)+"%</span></td>"+
      "<td style=\"color:var(--muted);font-size:11px\">"+j.notes+"</td>"+
      "<td class=\"dt\">"+fmtDate(j.date)+"</td></tr>";
  }).join("");
  setTimeout(function(){fetchModelPrices(pos);},500);
  return cards+
    "<div class=\"tw\" style=\"margin-bottom:10px\"><table><thead><tr><th>Symbol</th><th>Live Price</th><th>P&L%</th><th>Status</th><th>Chart</th><th>Days</th><th>Entry</th><th>Stop</th><th>Target</th></tr></thead><tbody>"+posRows+"</tbody></table></div>"+
    "<div style=\"font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px\">Journal</div>"+
    "<div class=\"tw\"><table><thead><tr><th>Symbol</th><th>Action</th><th>Price</th><th>P&L%</th><th>Notes</th><th>Date</th></tr></thead><tbody>"+jRows+"</tbody></table></div>";
}

function fetchModelPrices(positions){
  if(!positions||!positions.length) return;
  var symbols=positions.map(function(p){return p.symbol;}).join(",");
  var url=getUrl()+"?action=live&symbols="+encodeURIComponent(symbols);
  fetch(url, {redirect:"follow"})
    .then(function(r){return r.json();})
    .then(function(data){
      var cur=MARKET==="NSE"?"Rs.":"$";
      positions.forEach(function(p){
        var d=data[p.symbol];
        var el=document.getElementById("mp-live-"+p.symbol);
        if(el&&d&&d.price){
          var color=d.chg>=0?"#10b981":"#ef4444";
          var sign=d.chg>=0?"+":"";
          el.innerHTML="<span style='font-weight:600'>"+cur+d.price.toFixed(2)+"</span><span style='font-size:10px;color:"+color+"'> "+sign+d.chg.toFixed(1)+"%</span>";
        }
      });
    })
    .catch(function(){});
}

function renderHistory(){
  var h=D.history||[];
  if(!h.length) return "<div class=\"empty\">No history</div>";
  var cur=MARKET==="NSE"?"Rs.":"$";
  return "<div class=\"tw\"><table><thead><tr><th>Symbol</th><th>Signal</th><th>Rank</th><th>Price</th><th>Chart</th><th>Date</th></tr></thead><tbody>"+
    h.slice(0,200).map(function(r){
      var sig=r.signal==="STRONG BUY"?"<span class=\"bsb\">STRONG BUY</span>":r.signal==="BUY"?"<span class=\"bb\">BUY</span>":"<span class=\"bw\">WATCH</span>";
      var rk=r.rank>=90?"r90":r.rank>=80?"r80":"r70";
      return "<tr><td class=\"sym\">"+r.symbol+"</td><td>"+sig+"</td>"+
        "<td><span class=\"rk "+rk+"\">"+r.rank+"</span></td>"+
        "<td class=\"price\">"+cur+(r.price||0).toFixed(2)+"</td>"+
        "<td><a class=\"tv\" href=\"https://www.tradingview.com/chart/?symbol="+(MARKET==="NSE"?"NSE%3A":"")+r.symbol+"&interval=D\" target=\"_blank\">&#8599;</a></td>"+
        "<td class=\"dt\">"+fmtDate(r.date)+"</td></tr>";
    }).join("")+"</tbody></table></div>";
}

function renderWatchlist(){
  var w=D.watchlist||[];
  if(!w.length) return "<div class=\"empty\">Watchlist empty</div>";
  return "<div class=\"tw\"><table><thead><tr><th>Symbol</th><th>Why</th><th>Target</th><th>Stop</th><th>Status</th><th>Chart</th><th>Added</th></tr></thead><tbody>"+
    w.map(function(r){
      var st=r.status==="Watching"?"<span class=\"bw\" style=\"font-size:10px\">Watch</span>":r.status==="Entered"?"<span class=\"bb\" style=\"font-size:10px\">Entered</span>":r.status==="Exited"?"<span class=\"bsb\" style=\"font-size:10px\">Exited</span>":"<span class=\"st-stop\" style=\"font-size:10px\">Stopped</span>";
      return "<tr><td class=\"sym\">"+r.symbol+"</td>"+
        "<td style=\"color:var(--muted);font-size:11px;max-width:120px;overflow:hidden;text-overflow:ellipsis\">"+r.why+"</td>"+
        "<td style=\"color:var(--green);font-size:11px;font-family:monospace\">"+r.target+"</td>"+
        "<td style=\"color:var(--red);font-size:11px;font-family:monospace\">"+r.stopLoss+"</td>"+
        "<td>"+st+"</td>"+
        "<td><a class=\"tv\" href=\"https://www.tradingview.com/chart/?symbol="+(MARKET==="NSE"?"NSE%3A":"")+r.symbol+"&interval=D\" target=\"_blank\">&#8599;</a></td>"+
        "<td class=\"dt\">"+fmtDate(r.addedOn)+"</td></tr>";
    }).join("")+"</tbody></table></div>";
}

function renderJournal(){
  var j=D.journal||[];
  if(!j.length) return "<div class=\"empty\">Journal empty</div>";
  var won=j.filter(function(x){return x.pnl>0;}).length;
  var cards="<div class=\"card-grid\">"+
    "<div class=\"card\"><div class=\"card-l\">Trades</div><div class=\"card-v\" style=\"color:var(--gold)\">"+j.length+"</div></div>"+
    "<div class=\"card\"><div class=\"card-l\">Winners</div><div class=\"card-v\" style=\"color:var(--green)\">"+won+"</div></div>"+
    "<div class=\"card\"><div class=\"card-l\">Losers</div><div class=\"card-v\" style=\"color:var(--red)\">"+(j.length-won)+"</div></div>"+
    "<div class=\"card\"><div class=\"card-l\">Win Rate</div><div class=\"card-v\" style=\"color:var(--accent)\">"+(j.length?Math.round(won/j.length*100):0)+"%</div></div>"+
    "</div>";
  return cards+"<div class=\"tw\"><table><thead><tr><th>Symbol</th><th>Entry $</th><th>Exit $</th><th>P&L $</th><th>P&L %</th><th>Chart</th><th>Date</th></tr></thead><tbody>"+
    j.map(function(r){
      return "<tr><td class=\"sym\">"+r.symbol+"</td>"+
        "<td class=\"price\">$"+(r.entryPrice||0).toFixed(2)+"</td>"+
        "<td class=\"price\">$"+(r.exitPrice||0).toFixed(2)+"</td>"+
        "<td><span class=\""+(r.pnl>=0?"pos":"neg")+"\">$"+(r.pnl||0).toFixed(2)+"</span></td>"+
        "<td><span class=\""+(r.pnlPct>=0?"pos":"neg")+"\">"+(r.pnlPct||0).toFixed(1)+"%</span></td>"+
        "<td><a class=\"tv\" href=\"https://www.tradingview.com/chart/?symbol="+r.symbol+"&interval=D\" target=\"_blank\">&#8599;</a></td>"+
        "<td class=\"dt\">"+fmtDate(r.entryDate)+"</td></tr>";
    }).join("")+"</tbody></table></div>";
}

function renderLog(){
  return "<div class=\"log-box\">"+(D.log||"Log empty").replace(/</g,"&lt;").replace(/>/g,"&gt;")+"</div>";
}

function exportCSV(){
  if(!FILTERED.length){alert("No data");return;}
  var rows=[["Rank","Symbol","Sector","Cap","Price","Signal"]];
  FILTERED.forEach(function(s){rows.push([s.rank,s.symbol,s.sector,s.cat,s.price,s.signal]);});
  var a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(rows.map(function(r){return r.join(",");}).join("\n"));
  a.download=MARKET+"_"+ACTIVE_TAB+"_"+new Date().toISOString().slice(0,10)+".csv";
  a.click();
}

// Init
(function(){
  var t=localStorage.getItem("ai_th")||"light";
  document.body.className="t-"+t;
  var d=document.querySelector(".td-"+t);
  if(d){document.querySelectorAll(".td").forEach(function(x){x.classList.remove("on");});d.classList.add("on");}
  var params=new URLSearchParams(window.location.search);
  var m=params.get("m");
  if(m&&m.toUpperCase()==="US"){
    MARKET="US";
    document.querySelectorAll(".mkt-btn").forEach(function(b){b.classList.remove("active");});
    var btns=document.querySelectorAll(".mkt-btn");
    if(btns[1]) btns[1].classList.add("active");
  }
  buildTabbar();
  loadData();
  // Auto refresh live prices every 60 seconds
  setInterval(function(){
    if(document.getElementById("tbody")){
      // Clear price cache so fresh prices are fetched
      PRICE_CACHE={};
      fetchLivePrices();
    }
  }, 30000);
})();
